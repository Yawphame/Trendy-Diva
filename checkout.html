<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Trendy Diva Wears</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">TRENDY DIVA WEARS</a>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="collections.html">Collections</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="icon-btn cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">3</span>
                </a>
            </div>

            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <section class="section checkout-section">
        <div class="container">
            <h1 class="section-title">Checkout</h1>

            <div class="checkout-grid">

                <!-- Left Column: Forms -->
                <div class="checkout-forms">

                    <!-- Shipping Information -->
                    <div class="form-section">
                        <h2>Shipping Address</h2>
                        <form id="shippingForm">
                            <div class="form-row">
                                <input type="text" placeholder="First Name" required>
                                <input type="text" placeholder="Last Name" required>
                            </div>
                            <input type="email" placeholder="Email Address" required>
                            <input type="tel" placeholder="Phone Number" value="+1 (832) 332-7482">
                            <input type="text" placeholder="Street Address" required>
                            <div class="form-row">
                                <input type="text" placeholder="City" required>
                                <select required>
                                    <option value="">State</option>
                                    <option value="TX" selected>Texas</option>
                                </select>
                            </div>
                            <input type="text" placeholder="ZIP Code" value="77002" required>
                        </form>
                    </div>

                    <!-- Payment Information -->
                    <div class="form-section">
                        <h2>Payment Method</h2>
                        <div class="payment-options">
                            <label class="payment-option active">
                                <input type="radio" name="payment" checked>
                                <i class="fa-solid fa-credit-card"></i>
                                Credit / Debit Card
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment">
                                <i class="fa-brands fa-apple-pay"></i>
                                Apple Pay
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment">
                                <i class="fa-brands fa-paypal"></i>
                                PayPal
                            </label>
                        </div>

                        <div class="card-details">
                            <input type="text" placeholder="Card Number" maxlength="19">
                            <div class="form-row">
                                <input type="text" placeholder="MM / YY">
                                <input type="text" placeholder="CVC">
                            </div>
                            <input type="text" placeholder="Cardholder Name">
                        </div>
                    </div>
                </div>

                <!-- Right Column: Order Summary -->
                <div class="order-summary">
                    <h2>Order Summary</h2>
                    
                    <div class="order-items" id="orderItems">
                        <!-- Populated by JS -->
                    </div>

                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="summary-subtotal">$345.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span class="free">FREE</span>
                        </div>
                        <div class="summary-row total">
                            <strong>Total</strong>
                            <strong id="summary-total">$345.00</strong>
                        </div>
                    </div>

                    <button onclick="processPayment()" class="btn-primary complete-order-btn">
                        Complete Order • <span id="final-total">$345.00</span>
                    </button>

                    <div class="trust-badges">
                        <p><i class="fa-solid fa-lock"></i> Secure Payment</p>
                        <p>🔒 SSL Encrypted • Powered by Stripe</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p style="text-align:center; padding: 2rem 0;">&copy; 2026 Trendy Diva Wears. All Rights Reserved. | Houston, Texas</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Sample Cart Items
        let cart = [
            { name: "Serenity Floral Maxi Dress", price: 128, qty: 1 },
            { name: "Cashmere Silk Blend Top", price: 89, qty: 2 }
        ];

        function renderOrderSummary() {
            const container = document.getElementById('orderItems');
            let subtotal = 0;
            let html = '';

            cart.forEach(item => {
                const total = item.price * item.qty;
                subtotal += total;
                html += `
                    <div class="order-item">
                        <span>${item.name} × ${item.qty}</span>
                        <span>$${total}</span>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('summary-subtotal').textContent = `$${subtotal}`;
            document.getElementById('summary-total').textContent = `$${subtotal}`;
            document.getElementById('final-total').textContent = `$${subtotal}`;
        }

        function processPayment() {
            const btn = document.querySelector('.complete-order-btn');
            btn.innerHTML = 'Processing... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            setTimeout(() => {
                alert("🎉 Order Placed Successfully!\n\nThank you for shopping with Trendy Diva Wears.\nA confirmation email has been sent.");
                window.location.href = "index.html";
            }, 1800);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderOrderSummary);
    </script>
</body>
</html>
